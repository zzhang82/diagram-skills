name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Smoke render examples
        run: python -m diagram_studio.cli render-examples --outdir generated-ci

      - name: Smoke export Mermaid
        run: python -m diagram_studio.cli export-mermaid examples/agent_memory_bridge.json --outdir generated-ci
